<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteGen Login</title>
    <link rel="stylesheet" href="QGPage1.css">
</head>
<body>
    <div class="top-links">
        <a class="back-home" href="index.html">← Home</a>
    </div>

    <div class="container">
        <h1>QuoteGen Login</h1>
        <div id="loginStatus" class="login-status"></div>
        <form id="loginForm" class="login-form">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter a username" autocomplete="username">

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter a password" autocomplete="current-password">

            <div class="remember-row">
                <input type="checkbox" id="rememberMe" checked>
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit">Sign in / Register</button>
        </form>
        <p class="login-note">If this username doesn't exist yet, an account will be created automatically.</p>
    </div>

    <script src="site.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginStatus = document.getElementById('loginStatus');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberMeCheckbox = document.getElementById('rememberMe');

        const currentUser = getCurrentUser();

        function showStatus(message, isError = false) {
            loginStatus.innerHTML = `<p>${escapeHtml(message)}</p>`;
            loginStatus.style.color = isError ? '#ff8a8a' : '#d1d1d1';
        }

        function renderLoginStatus() {
            if (currentUser) {
                loginForm.style.display = 'none';
                loginStatus.innerHTML = `
                    <p>You are signed in as <strong>${escapeHtml(currentUser.displayName || currentUser.username)}</strong>.</p>
                    <p><a href="QGPage1.html">Go to Quote Generator</a> or <a href="#" id="logoutLink">Logout</a></p>
                `;
                document.getElementById('logoutLink').addEventListener('click', function (event) {
                    event.preventDefault();
                    clearCurrentUser();
                    location.reload();
                });
            } else {
                showStatus('Enter your username and password to sign in or register.');
            }
        }

        loginForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const remember = rememberMeCheckbox.checked;

            if (!username || !password) {
                showStatus('Username and password are required.', true);
                return;
            }

            const existing = getUser(username);
            if (existing) {
                if (!authenticateUser(username, password)) {
                    showStatus('Incorrect password. Please try again.', true);
                    return;
                }

                loginUser(username, password, remember);
                window.location.href = 'QGPage1.html';
                return;
            }

            const newUser = registerUser(username, password);
            if (!newUser) {
                showStatus('Username is already in use. Choose a different one.', true);
                return;
            }

            loginUser(username, password, remember);
            window.location.href = 'QGPage1.html';
        });

        renderLoginStatus();
    </script>
</body>
</html>
