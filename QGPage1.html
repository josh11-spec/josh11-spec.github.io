<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteGen Generator</title>
    <link rel="stylesheet" href="QGPage1.css">
</head>

<body>

    <header class="site-header">
        <div class="logo">QuoteGen</div>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="QGPage1.html" class="active">Generator</a>
            <a href="admin.html">Admin</a>
            <a id="loginAction" href="login.html">Login</a>
            <a href="#features">Features</a>
            <a href="#about">About</a>
        </nav>
    </header>

    <div class="container">
        <div id="userPanel" class="user-panel"></div>

        <h1>Flame Quote Generator</h1>

        <div class="quote-box">
            <p id="quote">Generate a quote to motivate yourself</p>
        </div>

        <button id="generateBtn">Generate Quote</button>

        <div class="add-quote-section">

            <h2>Add Your Own Quote</h2>

            <input type="text" id="newQuote" placeholder="Write a quote...">

            <button id="addQuoteBtn">Add Quote</button>

        </div>

        <div class="quote-dashboard">
            <h2>Your Quote Library</h2>
            <div class="stats-grid" id="statsGrid"></div>
            <table class="quote-table">
                <thead>
                    <tr>
                        <th>Quote</th>
                        <th>Words</th>
                        <th>Added</th>
                    </tr>
                </thead>
                <tbody id="quoteTableBody"></tbody>
            </table>
        </div>

        <div class="public-quote-section">
            <h2>Community Quotes</h2>
            <table class="quote-table public-table">
                <thead>
                    <tr>
                        <th>Quote</th>
                        <th>Author</th>
                        <th>Words</th>
                        <th>Added</th>
                    </tr>
                </thead>
                <tbody id="publicQuoteBody"></tbody>
            </table>
        </div>

    </div>

<script src="site.js"></script>
<script src="QGPage1.js"></script>

</body>
</html>
